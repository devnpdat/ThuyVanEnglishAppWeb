name: english_learning_app
description: English learning app - learn 5 sentences per day with audio and spaced repetition.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # State management & Dependency Injection
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Navigation
  go_router: ^13.2.4

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Storage & Cache
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1

  # Image & Media
  image_picker: ^1.0.7
  file_picker: ^6.1.0

  # UI & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.0.0

  # Utilities
  freezed_annotation: ^2.4.1
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  logger: ^2.1.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  mocktail: ^1.0.4
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true

